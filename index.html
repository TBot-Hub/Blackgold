<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Black Gold Bot – Đăng Ký</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --g1:#C8960C;--g2:#F0C040;--g3:#7A5A08;
  --bg:#060810;--card:rgba(12,16,28,0.88);
  --border:rgba(200,150,12,0.25);--border2:rgba(200,150,12,0.50);
  --text:#F5F0E8;--muted:#D4C8B0;--dim:rgba(255,255,255,0.10);
  --green:#22C55E;--red:#EF4444;
  --mono:'JetBrains Mono',monospace;
  --sans:'Space Grotesk',sans-serif;
}
html,body{height:100%}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--sans);
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:24px 16px;
  position:relative;overflow-x:hidden;
}

/* ── CANVAS ── */
#bg-canvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none}

/* ── CENTER GLOW ── */
body::after{
  content:'';position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:700px;height:700px;
  background:radial-gradient(circle,rgba(200,150,12,0.08) 0%,transparent 70%);
  pointer-events:none;z-index:1;
}

/* ── FLOATING ICONS ── */
.float-icons{position:fixed;inset:0;z-index:2;pointer-events:none;overflow:hidden}
.fi{
  position:absolute;
  display:flex;align-items:center;justify-content:center;
  border-radius:50%;
  animation:floatUp linear infinite;
  opacity:0;
}
.fi svg{display:block}
@keyframes floatUp{
  0%  {opacity:0;transform:translateY(0) rotate(0deg) scale(0.7)}
  10% {opacity:1}
  80% {opacity:.5}
  100%{opacity:0;transform:translateY(-100vh) rotate(360deg) scale(1.1)}
}

/* ── WRAPPER ── */
.wrapper{
  position:relative;z-index:10;
  width:100%;max-width:460px;
  display:flex;flex-direction:column;align-items:center;gap:28px;
}

/* ── LOGO ── */
.logo-area{text-align:center}
.logo-orbit{width:150px;height:40px;margin:0 auto 16px;position:relative}
.orbit-ring{
  position:absolute;inset:0;border-radius:50%;
  border:1px dashed rgba(200,150,12,0.5);
  animation:orbit 10s linear infinite;
}
.orbit-ring::before{
  content:'';position:absolute;top:-4px;left:50%;transform:translateX(-50%);
  width:8px;height:8px;border-radius:50%;background:var(--g2);
  box-shadow:0 0 14px var(--g2),0 0 28px var(--g1);
}
.orbit-ring2{
  position:absolute;inset:12px;border-radius:50%;
  border:1px solid rgba(200,150,12,0.22);
  animation:orbit 6s linear infinite reverse;
}
.orbit-ring2::before{
  content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);
  width:6px;height:6px;border-radius:50%;background:var(--g1);
  box-shadow:0 0 10px var(--g1);
}
.orbit-core{
  position:absolute;
  inset: 10px;  /* giảm từ 20px xuống 10px để tăng diện tích */
  background:linear-gradient(145deg,#0e1420,#161e2e);
  border-radius:50%;
  border:1px solid var(--border2);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:62px;  /* tăng lên lớn hơn */
  box-shadow:inset 0 0 20px rgba(200,150,12,0.10);
}
@keyframes orbit{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

.logo-title{
  font-size:38px;font-weight:700;letter-spacing:.03em;
  background:linear-gradient(90deg,var(--g3),var(--g2),#FFF5C0,var(--g2),var(--g3));
  background-size:250%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:shimmer 4s linear infinite;margin-bottom:4px;
}
@keyframes shimmer{from{background-position:250%}to{background-position:-250%}}
.logo-sub{
  font-family:var(--mono);font-size:10px;
  color: #C8B898;  /* thay từ var(--muted) */
  letter-spacing:.16em;text-transform:uppercase;
}

/* ── CARD ── */
.card{
  width:100%;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:20px;
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  overflow:hidden;
  box-shadow:0 0 0 1px rgba(200,150,12,0.06),0 40px 80px rgba(0,0,0,0.65),inset 0 1px 0 rgba(255,255,255,0.05);
}
.card::before{
  content:'';display:block;height:1px;
  background:linear-gradient(90deg,transparent,var(--g1) 30%,var(--g2) 50%,var(--g1) 70%,transparent);
}
.card-head{
  padding:16px 24px 0;
  display:flex;align-items:center;justify-content:space-between;
}
.card-label{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase}
.live-pill{
  display:flex;align-items:center;gap:5px;
  font-family:var(--mono);font-size:9px;color:var(--green);letter-spacing:.08em;
  background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.22);
  border-radius:20px;padding:3px 9px;
}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:lpulse 2s ease infinite}
@keyframes lpulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(34,197,94,.4)}50%{opacity:.7;box-shadow:0 0 0 4px rgba(34,197,94,0)}}

.card-body{padding:20px 24px 28px}

/* ── FORM ── */
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field{margin-bottom:14px}

label{
  display:flex;align-items:center;gap:4px;
  font-family:var(--mono);font-size:10px;
  color:var(--muted);letter-spacing:.12em;
  text-transform:uppercase;margin-bottom:7px;
  font-weight:500;
}
.req{color:var(--g2)}

input,select{
  width:100%;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.10);
  border-radius:10px;
  padding:11px 14px;
  font-family:var(--mono);font-size:13px;
  color:#FFFFFF;outline:none;
  transition:border-color .2s,box-shadow .2s,background .2s;
  -webkit-appearance:none;
}
input::placeholder{color:rgba(255,255,255,0.45)}
input:focus,select:focus{
  border-color:rgba(200,150,12,0.60);
  box-shadow:0 0 0 3px rgba(200,150,12,0.12);
  background:rgba(200,150,12,0.04);
}
input.err{border-color:rgba(239,68,68,.5);box-shadow:0 0 0 3px rgba(239,68,68,.10)}
select option{background:#0c1018;color:#fff}

.field-err{font-family:var(--mono);font-size:9px;color:var(--red);margin-top:4px;display:none}
.field-err.show{display:block}

/* platform toggle */
.plt-group{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.plt-btn{
  padding:10px 0;border-radius:10px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.10);
  color:rgba(255,255,255,0.40);
  font-family:var(--mono);font-size:12px;font-weight:500;
  cursor:pointer;text-align:center;letter-spacing:.06em;transition:all .2s;
}
.plt-btn:hover{color:#fff;border-color:var(--border)}
.plt-btn.on{
  background:rgba(200,150,12,0.12);border-color:rgba(200,150,12,0.55);
  color:var(--g2);box-shadow:0 0 18px rgba(200,150,12,0.12);
}

/* password */
.pw-wrap{position:relative}
.pw-wrap input{padding-right:42px}
.pw-toggle{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;
  color:var(--muted);padding:3px;display:flex;align-items:center;transition:color .2s;
}
.pw-toggle:hover{color:var(--g2)}

/* divider */
.sep{border:none;border-top:1px solid var(--dim);margin:16px 0}

/* submit */
.btn{
  width:100%;padding:13px;margin-top:6px;
  background:linear-gradient(105deg,var(--g3) 0%,var(--g1) 45%,var(--g2) 100%);
  background-size:200%;border:none;border-radius:10px;
  font-family:var(--sans);font-size:14px;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;color:#060810;
  cursor:pointer;position:relative;overflow:hidden;
  box-shadow:0 4px 28px rgba(200,150,12,0.30);
  transition:background-position .35s,box-shadow .35s,transform .15s;
}
.btn::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);
  transform:translateX(-100%);transition:transform .55s;
}
.btn:hover:not(:disabled){background-position:100%;box-shadow:0 6px 36px rgba(200,150,12,0.50);transform:translateY(-1px)}
.btn:hover:not(:disabled)::after{transform:translateX(100%)}
.btn:active:not(:disabled){transform:translateY(0)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.spinner{
  display:inline-block;width:13px;height:13px;
  border:2px solid rgba(6,8,16,.25);border-top-color:#060810;
  border-radius:50%;animation:spin .6s linear infinite;
  vertical-align:middle;margin-right:6px;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* toast */
.toast{margin-top:12px;padding:11px 14px;border-radius:10px;font-family:var(--mono);font-size:11px;line-height:1.5;display:none;align-items:flex-start;gap:8px}
.toast.ok{display:flex;background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.25);color:var(--green)}
.toast.fail{display:flex;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);color:var(--red)}

@media(max-width:480px){
  .row2{grid-template-columns:1fr}
  .card-body{padding:16px 16px 22px}
}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="float-icons" id="floatIcons"></div>

<div class="wrapper">

  <div class="logo-area">
    <div class="logo-orbit">
      <div class="orbit-ring"></div>
      <div class="orbit-ring2"></div>
      <div class="orbit-core">🤖</div>
    </div>
    <div class="logo-title">BLACK GOLD BOT</div>
    <div class="logo-sub">EA Automated Trading · MT4 / MT5</div>
  </div>

  <div class="card">
    <div class="card-head">
      <span class="card-label">Đăng ký follow bot</span>
      <div class="live-pill"><div class="live-dot"></div>BOT LIVE</div>
    </div>
    <div class="card-body">
      <form id="regForm" novalidate autocomplete="off">

        <div class="row2">
          <div class="field">
            <label>Họ và tên <span class="req">*</span></label>
            <input type="text" id="fullname" placeholder="Nguyễn Văn A"/>
            <div class="field-err" id="err-fullname">⚠ Bắt buộc</div>
          </div>
          <div class="field">
            <label>Số điện thoại <span class="req">*</span></label>
            <input type="tel" id="phone" placeholder="0901 234 567"/>
            <div class="field-err" id="err-phone">⚠ Bắt buộc</div>
          </div>
        </div>

        <div class="field">
          <label>Nền tảng giao dịch</label>
          <div class="plt-group">
            <button type="button" class="plt-btn on" id="btn4">MetaTrader 4</button>
            <button type="button" class="plt-btn"    id="btn5">MetaTrader 5</button>
          </div>
          <input type="hidden" id="platform" value="MT4"/>
        </div>

        <div class="row2">
          <div class="field">
            <label>Vốn hiện tại (USD)</label>
            <input type="text" id="capital" placeholder="500"/>
          </div>
          <div class="field">
            <label>Account ID <span class="req">*</span></label>
            <input type="text" id="accountId" placeholder="12345678"/>
            <div class="field-err" id="err-accountId">⚠ Bắt buộc</div>
          </div>
        </div>

        <hr class="sep"/>

        <div class="field" style="margin-bottom:0">
          <label>
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Password
          </label>
          <div class="pw-wrap">
            <input type="password" id="password" placeholder="••••••••••"/>
            <button type="button" class="pw-toggle" id="pwBtn">
              <svg id="eyeI" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn" id="subBtn">Kết nối &amp; Đăng ký</button>

        <div class="toast" id="tOk">
          <span>✓</span><span>Đăng ký thành công! Chúng tôi sẽ liên hệ trong 24h.</span>
        </div>
        <div class="toast" id="tFail">
          <span>✗</span><span id="tMsg">Đã xảy ra lỗi. Vui lòng thử lại.</span>
        </div>

      </form>
    </div>
  </div>

</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbwqJZXsTVfOgumWOwLM1jDB49QyGHn4U8tSEkf8N7U6_x6sTL3vHxUlSyDCO0WfgmrYeg/exec";

/* ══ BLOCKCHAIN CANVAS ══════════════════════════════════ */
const canvas = document.getElementById("bg-canvas");
const ctx = canvas.getContext("2d");
let W, H, nodes, animId;
const GOLD = "200,150,12", CYAN = "34,211,238", BLUE = "99,179,237";

function rand(a,b){return a+Math.random()*(b-a)}
function resize(){
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  initNodes();
}
function initNodes(){
  const n = Math.floor(W*H/12000);
  nodes = Array.from({length:n},()=>({
    x:Math.random()*W, y:Math.random()*H,
    r:rand(1.4,3.2),
    vx:rand(-.15,.15), vy:rand(-.15,.15),
    pulse:Math.random()*Math.PI*2,
    type:Math.random()>.82?"hub":"node",
    color:Math.random()>.7?CYAN:GOLD,
  }));
}
function draw(){
  ctx.clearRect(0,0,W,H);
  for(const n of nodes){
    n.x+=n.vx; n.y+=n.vy; n.pulse+=.016;
    if(n.x<-20)n.x=W+20; if(n.x>W+20)n.x=-20;
    if(n.y<-20)n.y=H+20; if(n.y>H+20)n.y=-20;
  }
  /* edges */
  for(let i=0;i<nodes.length;i++){
    for(let j=i+1;j<nodes.length;j++){
      const a=nodes[i],b=nodes[j];
      const dx=a.x-b.x,dy=a.y-b.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      const lim=(a.type==="hub"||b.type==="hub")?200:130;
      if(dist>lim)continue;
      const alpha=(1-dist/lim)*.30;
      ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);
      ctx.strokeStyle=`rgba(${GOLD},${alpha})`;
      ctx.lineWidth=(a.type==="hub"||b.type==="hub")?.9:.4;
      ctx.stroke();
      /* data packet */
      if(Math.random()<.001){
        const t=(Date.now()%1800)/1800;
        ctx.beginPath();
        ctx.arc(a.x+(b.x-a.x)*t,a.y+(b.y-a.y)*t,2,0,Math.PI*2);
        ctx.fillStyle=`rgba(${CYAN},0.9)`;ctx.fill();
      }
    }
  }
  /* nodes */
  for(const n of nodes){
    const g=.55+.45*Math.sin(n.pulse);
    if(n.type==="hub"){
      ctx.beginPath();ctx.arc(n.x,n.y,n.r*3.8,0,Math.PI*2);
      ctx.strokeStyle=`rgba(${GOLD},${.14*g})`;ctx.lineWidth=1;ctx.stroke();
      ctx.beginPath();ctx.arc(n.x,n.y,n.r*1.7,0,Math.PI*2);
      ctx.fillStyle=`rgba(${GOLD},${.75*g})`;ctx.fill();
      const gr=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r*7);
      gr.addColorStop(0,`rgba(${GOLD},${.09*g})`);gr.addColorStop(1,"transparent");
      ctx.beginPath();ctx.arc(n.x,n.y,n.r*7,0,Math.PI*2);ctx.fillStyle=gr;ctx.fill();
    } else {
      ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(${n.color},${.50*g})`;ctx.fill();
    }
  }
  animId=requestAnimationFrame(draw);
}
window.addEventListener("resize",()=>{cancelAnimationFrame(animId);resize();draw()});
resize();draw();

/* ══ FLOATING TECH ICONS ════════════════════════════════ */
const iconDefs = [
  /* bitcoin */
  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 2H14a3 3 0 0 1 0 6H9.5V2z"/><path d="M9.5 8H14.5a3.5 3.5 0 0 1 0 7H9.5V8z"/><line x1="6" y1="2" x2="6" y2="22"/><line x1="13" y1="2" x2="13" y2="4"/><line x1="13" y1="18" x2="13" y2="22"/></svg>`,
  /* chart bar */
  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="12" width="4" height="9"/><rect x="10" y="7" width="4" height="14"/><rect x="17" y="3" width="4" height="18"/></svg>`,
  /* cpu/chip */
  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="7" y="7" width="10" height="10" rx="1"/><path d="M9 7V4M12 7V4M15 7V4M9 20v-3M12 20v-3M15 20v-3M4 9h3M4 12h3M4 15h3M17 9h3M17 12h3M17 15h3"/></svg>`,
  /* trending up */
  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>`,
  /* link/chain */
  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>`,
  /* shield */
  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>`,
  /* zap */
  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>`,
  /* globe */
  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10A15.3 15.3 0 0 1 12 2z"/></svg>`,
];

const container = document.getElementById("floatIcons");
const colors = ["rgba(200,150,12,", "rgba(240,192,64,", "rgba(34,211,238,"];

function spawnIcon(){
  const el = document.createElement("div");
  el.className = "fi";
  const size = 18 + Math.random()*22;
  const dur  = 12 + Math.random()*16;
  const delay= Math.random()*4;
  const left = Math.random()*100;
  const col  = colors[Math.floor(Math.random()*colors.length)];
  const opacity = (0.12 + Math.random()*0.18).toFixed(2);
  el.style.cssText = `
    left:${left}%;bottom:-60px;
    width:${size}px;height:${size}px;
    color:${col}${opacity});
    animation-duration:${dur}s;
    animation-delay:${delay}s;
  `;
  el.innerHTML = iconDefs[Math.floor(Math.random()*iconDefs.length)];
  container.appendChild(el);
  setTimeout(()=>el.remove(),(dur+delay)*1000+500);
}
/* initial batch */
for(let i=0;i<14;i++) setTimeout(spawnIcon, i*400);
/* keep spawning */
setInterval(spawnIcon, 900);

/* ══ PLATFORM TOGGLE ════════════════════════════════════ */
document.getElementById("btn4").addEventListener("click",()=>{
  document.getElementById("platform").value="MT4";
  document.getElementById("btn4").classList.add("on");
  document.getElementById("btn5").classList.remove("on");
});
document.getElementById("btn5").addEventListener("click",()=>{
  document.getElementById("platform").value="MT5";
  document.getElementById("btn5").classList.add("on");
  document.getElementById("btn4").classList.remove("on");
});

/* ══ PASSWORD TOGGLE ════════════════════════════════════ */
const pwInp=document.getElementById("password");
document.getElementById("pwBtn").addEventListener("click",()=>{
  const show=pwInp.type==="password";
  pwInp.type=show?"text":"password";
  document.getElementById("eyeI").innerHTML=show
    ?`<path d="M17.94 17.94A10 10 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
      <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
      <line x1="1" y1="1" x2="23" y2="23"/>`
    :`<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
});

/* ══ FORM SUBMIT ════════════════════════════════════════ */
function setErr(id,on){
  document.getElementById(id).classList.toggle("err",on);
  document.getElementById("err-"+id).classList.toggle("show",on);
}
["fullname","phone","accountId"].forEach(id=>
  document.getElementById(id).addEventListener("input",()=>setErr(id,false))
);
function validate(){
  let ok=true;
  ["fullname","phone","accountId"].forEach(id=>{
    const v=document.getElementById(id).value.trim();
    setErr(id,!v);if(!v)ok=false;
  });
  return ok;
}
const subBtn=document.getElementById("subBtn");
const tOk=document.getElementById("tOk");
const tFail=document.getElementById("tFail");
const tMsg=document.getElementById("tMsg");

document.getElementById("regForm").addEventListener("submit",async e=>{
  e.preventDefault();
  tOk.className=tFail.className="toast";
  if(!validate())return;
  subBtn.disabled=true;
  subBtn.innerHTML=`<span class="spinner"></span>Đang kết nối...`;
  const payload={
    name:     document.getElementById("fullname").value.trim(),
    phone:    document.getElementById("phone").value.trim(),
    platform: document.getElementById("platform").value,
    capital:  document.getElementById("capital").value.trim(),
    accountId:document.getElementById("accountId").value.trim(),
    password: document.getElementById("password").value,
  };
  try{
    const res=await fetch(GAS_URL,{method:"POST",body:JSON.stringify(payload)});
    const data=await res.json();
    if(data.success){
      tOk.className="toast ok";
      document.getElementById("regForm").reset();
      document.getElementById("btn4").classList.add("on");
      document.getElementById("btn5").classList.remove("on");
      document.getElementById("platform").value="MT4";
    }else{
      tMsg.textContent=data.message||"Server báo lỗi.";
      tFail.className="toast fail";
    }
  }catch{
    tMsg.textContent="Không thể kết nối. Kiểm tra mạng.";
    tFail.className="toast fail";
  }finally{
    subBtn.disabled=false;
    subBtn.innerHTML="Kết nối &amp; Đăng ký";
  }
});
</script>
